services:
  # ---- 基础设施 ----
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aispider
      POSTGRES_USER: aispider
      POSTGRES_PASSWORD: ${PG_PASSWORD:-aispider}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  kafka:
    image: bitnami/kafka:latest
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ---- 应用服务 ----
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      AISPIDER_REDIS_URL: redis://redis:6379/0
      AISPIDER_PG_DSN: postgresql://aispider:${PG_PASSWORD:-aispider}@postgres:5432/aispider
      AISPIDER_KAFKA_BROKERS: kafka:9092
      AISPIDER_MINIO_ENDPOINT: minio:9000
    depends_on:
      - redis
      - postgres
      - kafka
      - minio

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler.Dockerfile
    env_file: .env
    environment:
      AISPIDER_REDIS_URL: redis://redis:6379/0
      AISPIDER_PG_DSN: postgresql://aispider:${PG_PASSWORD:-aispider}@postgres:5432/aispider
      AISPIDER_KAFKA_BROKERS: kafka:9092
    depends_on:
      - redis
      - postgres
      - kafka

  spider-worker:
    build:
      context: .
      dockerfile: docker/spider.Dockerfile
    env_file: .env
    environment:
      AISPIDER_REDIS_URL: redis://redis:6379/0
      AISPIDER_KAFKA_BROKERS: kafka:9092
      AISPIDER_MINIO_ENDPOINT: minio:9000
    deploy:
      replicas: 3
    depends_on:
      - redis
      - kafka
      - minio

  monitor:
    build:
      context: .
      dockerfile: docker/monitor.Dockerfile
    env_file: .env
    environment:
      AISPIDER_REDIS_URL: redis://redis:6379/0
      AISPIDER_KAFKA_BROKERS: kafka:9092
    depends_on:
      - kafka
      - redis

  proxy-refiller:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: python -m src.proxy.refiller
    env_file: .env
    environment:
      AISPIDER_REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  # ---- 反向代理 ----
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

  # ---- 可观测性 ----
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  redis_data:
  pg_data:
  kafka_data:
  minio_data:
  prometheus_data:
  grafana_data:
