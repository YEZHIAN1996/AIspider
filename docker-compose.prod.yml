# 生产环境覆盖配置
# 用法: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

  kafka:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

  minio:
    restart: always

  api:
    restart: always
    ports: []
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"

  scheduler:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  spider-worker:
    restart: always
    deploy:
      replicas: 5
      resources:
        limits:
          memory: 1G
          cpus: "1"

  monitor:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    restart: always
    ports:
      - "80:80"

  prometheus:
    restart: always

  grafana:
    restart: always
